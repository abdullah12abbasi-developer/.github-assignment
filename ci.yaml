# ============================================================
# Workflow Name
# This is the name of the entire CI/CD pipeline.
# ============================================================
name: My First CI/CD Pipeline
 
# ============================================================
# Event / Trigger
# This workflow runs on every push to the main branch,
# on every pull request targeting main, and can also be
# triggered manually from the Actions tab (workflow_dispatch).
# ============================================================
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
 
# ============================================================
# Jobs
# A workflow can have one or more jobs. Each job runs on a
# fresh virtual machine (runner).
# ============================================================
jobs:
 
  # ----------------------------------------------------------
  # Job 1: build
  # ----------------------------------------------------------
  build:
    name: Build and Basic Checks
    runs-on: ubuntu-latest    # Use the latest Ubuntu runner
 
    # ----------------------------------------------------------
    # Steps
    # Each step is one task inside the job.
    # ----------------------------------------------------------
    steps:
 
      # Step 1: Checkout the repository source code
      - name: Checkout Repository
        uses: actions/checkout@v3
 
      # Step 2: Show the current working directory
      - name: Show Current Directory
        run: pwd
 
      # Step 3: List all files in the repository
      - name: List Files
        run: ls -la
 
      # Step 4: Create a new directory named 'output'
      - name: Make Directory
        run: mkdir -p output
 
      # Step 5: Print a custom message to the console
      - name: Echo Learning Message
        run: echo "I am learning Github Actions"
 
      # Step 6: Verify the new directory was created
      - name: Verify Directory Created
        run: ls -la | grep output

